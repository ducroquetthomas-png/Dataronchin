<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
fetch('delinquance_202602.csv')
  .then(response => response.text())
  .then(text => {

    const rows = text.trim().split('\n');
    const header = rows[0].split(',');

    const idxAnnee = header.indexOf("annee");
    const idxInd = header.indexOf("indicateur");
    const idxNombre = header.indexOf("nombre");
    const idxDiffuse = header.indexOf("est_diffuse");
    const idxUnite = header.indexOf("unite_de_compte");

    const annees = [];
    const valeurs = [];
    let unite = "";

    rows.slice(1).forEach(row => {

      const cols = row.split(',').map(c =>
        c.trim().replace(/^"|"$/g, '')
      );
      if (cols[idxDiffuse] === "ndiff") return;

      const indicateur = cols[idxInd].replace(/"/g, '').trim();

      if (!indicateur.includes("Cambriolages de logement")) return;

      annees.push(cols[idxAnnee]);
      valeurs.push(parseFloat(cols[idxNombre]));
      unite = cols[idxUnite];
    });

console.log("Années:", annees);
console.log("Valeurs:", valeurs);
    
    new Chart(document.getElementById('chartDelinquance'), {
      type: 'line',
      data: {
        labels: annees,
        datasets: [{
          label: "Cambriolages de logement",
          data: valeurs,
          borderWidth: 2,
          tension: 0.2
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });

    // Affichage unité
    const infoDiv = document.createElement("div");
    infoDiv.style.marginTop = "15px";
    infoDiv.innerHTML =
      "<strong>Unité observée :</strong> " + unite;

    document.getElementById("chartDelinquance").after(infoDiv);

  });
</script>
