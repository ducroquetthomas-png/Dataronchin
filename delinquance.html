<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.chart-container {
  width: 60%;        /* environ 1/4 à 1/3 écran */
  max-width: 900px;
  height: 500px;
}


</style>
<div id="filters" style="margin-bottom:15px;"></div>

<div class="chart-container">
  <canvas id="chartDelinquance"></canvas>
</div>

<script>
fetch('delinquance_202602.csv')
  .then(response => response.text())
  .then(text => {

    const rows = text.trim().split('\n');
    const header = rows[0].split(',');

    const idxAnnee = header.indexOf("annee");
    const idxInd = header.indexOf("indicateur");
    const idxNombre = header.indexOf("nombre");
    const idxDiffuse = header.indexOf("est_diffuse");

    const categories = [
      "Cambriolages de logement",
      "Vols violents sans arme",
      "Vols sans violence contre des personnes",
      "Vols de véhicule",
      "Vols dans les véhicules",
      "Vols d'accessoires sur véhicules",
      "Escroqueries et fraudes aux moyens de paiement",
      "Vols avec armes",
      "Destructions et dégradations volontaires"
    ];

    const dataParIndicateur = {};
    const anneesSet = new Set();

    rows.slice(1).forEach(row => {

      const cols = row.split(',').map(c =>
        c.trim().replace(/^"|"$/g, '')
      );

      if (cols[idxDiffuse] === "ndiff") return;

      const indicateur = cols[idxInd];
      const annee = cols[idxAnnee];
      const nombre = parseFloat(cols[idxNombre]);

      if (!categories.includes(indicateur)) return;

      anneesSet.add(annee);

      if (!dataParIndicateur[indicateur]) {
        dataParIndicateur[indicateur] = {};
      }

      dataParIndicateur[indicateur][annee] = nombre;
    });

    const annees = Array.from(anneesSet).sort();

    const datasets = categories.map(cat => {

      if (!dataParIndicateur[cat]) return null;

      return {
        label: cat,
        data: annees.map(a =>
          dataParIndicateur[cat][a] ?? null
        ),
        borderWidth: 2,
        tension: 0.2
      };

    }).filter(Boolean);

const chart = new Chart(document.getElementById('chartDelinquance'), {
  type: 'line',
  data: {
    labels: annees,
    datasets: datasets
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: {
      mode: 'index',
      intersect: false
    },
    plugins: {
      legend: {
        display: false  // on remplace par nos filtres
      }
    },
    scales: {
      y: {
        beginAtZero: true
      }
    },
    onHover: (event, elements) => {
      if (elements.length) {
        const datasetIndex = elements[0].datasetIndex;

        chart.data.datasets.forEach((ds, i) => {
          ds.borderWidth = i === datasetIndex ? 4 : 1;
          ds.borderColor = i === datasetIndex ? ds.borderColor : '#cccccc';
        });

        chart.update('none');
      }
    }
  }
});
 
const filtersDiv = document.getElementById("filters");

chart.data.datasets.forEach((dataset, index) => {

  const label = document.createElement("label");
  label.style.marginRight = "15px";

  const checkbox = document.createElement("input");
  checkbox.type = "checkbox";
  checkbox.checked = true;

  checkbox.addEventListener("change", () => {
    chart.setDatasetVisibility(index, checkbox.checked);
    chart.update();
  });

  label.appendChild(checkbox);
  label.append(" " + dataset.label);

  filtersDiv.appendChild(label);
});
</script>
